ProjectId:
  type: string
  description: Идентификатор проекта
  example: '1'
  pattern: '^\d{1,19}$'
  minLength: 1
  maxLength: 19

Project:
  title: Project
  type: object
  description: Проект
  properties:
    id:
      $ref: '#/ProjectId'
    type:
      type: string
      enum:
        - project
      default: project
    attributes:
      type: object
      required:
        - name
        - pageType
        - uri
      properties:
        name:
          type: string
          example: Читай-город
          minLength: 2
          maxLength: 128
          description: Название
        pageType:
          type: string
          description: Тип страниц проекта
          example: |-
            Типы проекта
            - promotion - акции
            - content - контентные страницы
        uri:
          type: string
          example: 'https://www.chitai-gorod.ru'
          format: uri
          description: |-
            Uri проекта
            
            Примеры:
            
            - https://www.chitai-gorod.ru
            - https://www.chitai-gorod.ru/school
  required:
    - id
    - type
    - attributes

ProjectRelationEntity:
  type: object
  required:
    - type
    - id
  properties:
    type:
      type: string
      enum:
        - project
    id:
      $ref: '#/PromotionId'

PromotionId:
  type: string
  minLength: 36
  maxLength: 36
  format: uuid
  description: Идентификатор акции

Promotion:
  title: Promotion
  type: object
  description: Акция
  properties:
    id:
      $ref: '#/PromotionId'
    type:
      type: string
      enum:
        - promotion
      default: promotion
    attributes:
      type: object
      required:
        - title
        - description
        - direction
        - foreignId
        - activeFrom
        - activeTo
        - priority
        - createdAt
        - updatedAt
        - createdBy
        - updatedBy
      properties:
        title:
          type: string
          example: Ночь музеев
          minLength: 2
          maxLength: 128
          description: Заголовок акции
        description:
          type: string
          example: Скидки до 30% на подборку сувениров и книг по искусству. Для авторизованных пользователей
          minLength: 1
          maxLength: 512
          description: Анонс - описание акции
          nullable: true
        direction:
          type: array
          description: Список, где действует акция
          items:
            $ref: '#/PromotionDirection'
        foreignId:
          type: string
          description: Внутренний единый номер акции - берется из ВС при регистрации акции там
          minLength: 1
          maxLength: 10
          pattern: '\d+'
        activeFrom:
          type: string
          example: '2016-04-21T00:01:00+03:00'
          format: date-time
          description: Акция действует от даты
          nullable: true
        activeTo:
          type: string
          example: '2016-04-22T00:01:00+03:00'
          format: date-time
          description: Акция действует до даты
          nullable: true
        priority:
          type: integer
          example: 500
          default: 500
          minimum: 1
          maximum: 2147483647
          description: Приоритет вывода
    relationships:
      type: object
      properties:
        mainImageDesktop:
          type: object
          properties:
            data:
              $ref: '#/FileRelationEntity'
          required:
            - data
        mainImageAdaptive:
          type: object
          properties:
            data:
              $ref: '#/FileRelationEntity'
          required:
            - data
        page:
          type: object
          description: Страница
          properties:
            data:
              $ref: '#/PageRelationEntity'
          required:
            - data
        project:
          type: object
          description: Проект
          properties:
            data:
              $ref: '#/ProjectRelationEntity'
          required:
            - data

PromotionIncluded:
  title: PromotionIncluded
  type: array
  description: «Включения» акции
  items:
    oneOf:
      - $ref: '#/ConstructorPage'
      - $ref: '#/Project'
      - $ref: '#/File'

ExternalPromotion:
  title: ExternalPromotion
  type: object
  description: Акция - для внешнего апи
  properties:
    id:
      $ref: '#/PromotionId'
    type:
      type: string
      enum:
        - promotion
      default: promotion
    attributes:
      type: object
      required:
        - title
        - description
        - direction
        - foreignId
        - activeFrom
        - activeTo
        - priority
        - advertisementMarker
        - targetAuditory
      properties:
        title:
          type: string
          example: Ночь музеев
          minLength: 1
          maxLength: 128
          description: Заголовок акции
        description:
          type: string
          example: Скидки до 30% на подборку сувениров и книг по искусству. Для авторизованных пользователей
          minLength: 1
          maxLength: 512
          description: Анонс - описание акции
          nullable: true
        direction:
          type: array
          description: Список, где действует акция
          items:
            $ref: '#/PromotionDirection'
        foreignId:
          type: string
          description: Внутренний единый номер акции - берется из ВС при регистрации акции там
          minLength: 1
          maxLength: 10
          pattern: '\d+'
        activeFrom:
          type: string
          example: '2016-04-21T00:01:00+03:00'
          format: date-time
          description: Акция действует от даты
          nullable: true
        activeTo:
          type: string
          example: '2016-04-22T00:01:00+03:00'
          format: date-time
          description: Акция действует до даты
          nullable: true
        priority:
          type: integer
          example: 500
          default: 500
          minimum: 1
          maximum: 2147483647
          description: Приоритет вывода
        advertisementMarker:
          oneOf:
            - $ref: '#/PromotionAdvertisementMarker'
            - $ref: '#/NullType'
        targetAuditory:
          $ref: '#/PromotionTargetAuditory'
    relationships:
      type: object
      properties:
        mainImageDesktop:
          type: object
          properties:
            data:
              $ref: '#/FileRelationEntity'
          required:
            - data
        mainImageAdaptive:
          type: object
          properties:
            data:
              $ref: '#/FileRelationEntity'
          required:
            - data
        bannerImageMobile:
          type: object
          properties:
            data:
              $ref: '#/FileRelationEntity'
          required:
            - data
        page:
          type: object
          description: Страница
          properties:
            data:
              $ref: '#/PageRelationEntity'
          required:
            - data
        project:
          type: object
          description: Проект
          properties:
            data:
              $ref: '#/ProjectRelationEntity'
          required:
            - data

ExternalPromotionIncluded:
  title: ExternalPromotionIncluded
  type: array
  description: «Включения» акции для внешнего апи
  items:
    oneOf:
      - $ref: '#/ConstructorPage'
      - $ref: '#/Project'
      - $ref: '#/File'

PromotionDirection:
  type: string
  enum:
    - online
    - retail
  description: |-
    Где действует акция
    
    - online — Интернет-магазин
    - retail — Розничная сеть

PromotionRelationEntity:
  type: object
  required:
    - type
    - id
  properties:
    type:
      type: string
      enum:
        - promotion
    id:
      $ref: '#/PromotionId'

ProductSetRelationEntity:
  type: object
  properties:
    type:
      type: string
      enum:
        - productSet
    id:
      type: string
      format: uuid
  required:
    - type
    - id

PageId:
  type: string
  minLength: 36
  maxLength: 36
  format: uuid
  description: Идентификатор страницы

ConstructorPage:
  title: Page
  type: object
  description: Страница
  properties:
    id:
      $ref: '#/PageId'
    type:
      type: string
      enum:
        - page
      example: page
      default: page
    attributes:
      type: object
      required:
        - title
        - path
        - status
        - publishedFrom
        - publishedTo
        - availableOnlyByLink
        - createdAt
        - updatedAt
        - createdBy
        - updatedBy
      properties:
        title:
          type: string
          example: Читай-школа
          minLength: 2
          maxLength: 128
          description: Заголовок
        path:
          type: string
          example: /chitai-schkola
          minLength: 2
          maxLength: 128
          pattern: '^[a-z0-9\-\/]+$'
          description: Адрес страницы (относительный url)
        status:
          $ref: '#/PageStatus'
        publishedFrom:
          type: string
          format: date-time
          example: '2016-04-22T00:01:00+03:00'
          description: Опубликована от даты
          nullable: true
        publishedTo:
          type: string
          example: '2016-04-22T00:02:00+03:00'
          description: Опубликована до даты
          format: date-time
          nullable: true
        availableOnlyByLink:
          type: boolean
          description: Страница доступна только по прямой ссылке
        createdAt:
          type: string
          example: '2016-04-22T00:00:00+03:00'
          format: date-time
          description: Дата создания
        updatedAt:
          type: string
          example: '2016-04-22T00:00:00+03:00'
          format: date-time
          description: Дата последнего обновления
        createdBy:
          type: string
          example: admin@chitai-gorod.ru
          description: |-
            Пользователь, создавший страницу
            Предопределенные имена пользователей:
             - undefined - не определен, такое имя будет для тех страниц, которые созданы до внедрения данного функционала
        updatedBy:
          type: string
          example: admin@chitai-gorod.ru
          description: |-
            Пользователь, изменивший страницу
            Предопределенные имена пользователей:
             - undefined - не определен, такое имя будет для тех страниц, которые созданы до внедрения данного функционала
             - auto - для модификаций через скрипты, например деактивация страницы по истечению срока активности
    relationships:
      type: object
      properties:
        blocks:
          $ref: '#/PageBlockRelationEntity'
        project:
          type: object
          description: Проект
          properties:
            data:
              $ref: '#/ProjectRelationEntity'
          required:
            - data
        seo:
          $ref: '#/PageSeoRelationEntity'
        files:
          $ref: '#/PageFilesRelationEntity'
        parents:
          type: object
          description: Полная цепочка родительских страниц (начиная от корня)
          properties:
            data:
              type: array
              items:
                $ref: '#/PageRelationEntity'
          required:
            - data
        children:
          type: object
          description: Дочерние страницы
          properties:
            data:
              type: array
              items:
                $ref: '#/PageRelationEntity'
          required:
            - data
        productSets:
          type: object
          description: Наборы товаров страницы
          properties:
            data:
              type: array
              items:
                $ref: '#/ProductSetRelationEntity'
          required:
            - data
        promotion:
          type: object
          description: Акция
          properties:
            data:
              $ref: '#/PromotionRelationEntity'
          required:
            - data
  required:
    - id
    - type
    - attributes

